name: CI Pipeline

# Trigger this workflow whenever a Pull Request is opened against the 'main' branch
on:
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Just the Linter
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Linter
        run: npm run lint

  # JOB 2: Just the Unit Tests
  test:
    name: Unit Test Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Tests
        run: npm run test